<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hamari Shaadi — Wedding Album</title>
<style>
  :root{
    --maroon:#5e1224;
    --maroon-deep:#3c0a17;
    --gold:#c9a14a;
    --gold-light:#e9d5a0;
    --cream:#fbe9d8;
    --ink:#2a1810;
    --font-display:'Cormorant Garamond', 'Georgia', serif;
    --font-body:'Marcellus', 'Georgia', serif;
  }

  @font-face{
    font-family:'Cormorant Garamond';
    src:local('Cormorant Garamond');
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    background:var(--cream);
    background-image:
      radial-gradient(circle at 10% 10%, rgba(201,161,74,0.10) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(94,18,36,0.08) 0%, transparent 40%);
    color:var(--ink);
    font-family:var(--font-body), serif;
    min-height:100vh;
  }

  /* ---------- HEADER ---------- */
  header{
    text-align:center;
    padding:70px 20px 50px;
    position:relative;
    overflow:hidden;
  }

  header::before, header::after{
    content:"";
    position:absolute;
    top:50%;
    width:30%;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  header::before{ left:0; }
  header::after{ right:0; }

  .eyebrow{
    letter-spacing:6px;
    text-transform:uppercase;
    font-size:12px;
    color:var(--maroon);
    font-weight:600;
    opacity:0.75;
  }

  h1.title{
    font-family:'Georgia', serif;
    font-family: 'Times New Roman', serif;
    font-family: serif;
    font-size:clamp(40px, 7vw, 76px);
    color:var(--maroon-deep);
    margin:14px 0 8px;
    font-weight:400;
    font-style:italic;
    letter-spacing:1px;
  }

  .ampersand{
    color:var(--gold);
    font-size:0.55em;
    padding:0 12px;
    font-style:normal;
  }

  .subtitle{
    color:var(--ink);
    opacity:0.65;
    font-size:15px;
    letter-spacing:2px;
    text-transform:uppercase;
  }

  .ornament{
    margin:24px auto 0;
    width:120px;
    height:auto;
    opacity:0.8;
  }

  /* ---------- CONTROLS ---------- */
  .controls{
    max-width:900px;
    margin:0 auto 18px;
    padding:0 20px;
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    align-items:center;
    justify-content:center;
  }

  .search-box{
    flex:1 1 260px;
    max-width:340px;
    position:relative;
  }

  .search-box input{
    width:100%;
    padding:11px 16px;
    border:1px solid var(--gold-light);
    background:#fffdf8;
    border-radius:30px;
    font-family:var(--font-body);
    font-size:14px;
    color:var(--ink);
    outline:none;
    transition:border-color .2s;
  }
  .search-box input:focus{ border-color:var(--gold); }

  .counter{
    font-size:13px;
    color:var(--maroon);
    letter-spacing:1px;
    white-space:nowrap;
  }

  .filter-pills{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:center;
  }

  .pill{
    padding:7px 18px;
    border:1px solid var(--gold-light);
    border-radius:20px;
    background:transparent;
    color:var(--maroon-deep);
    font-family:var(--font-body);
    font-size:13px;
    cursor:pointer;
    transition:all .2s;
  }
  .pill.active, .pill:hover{
    background:var(--maroon);
    border-color:var(--maroon);
    color:var(--cream);
  }

  /* ---------- UPLOAD BAR ---------- */
  .upload-bar{
    max-width:900px;
    margin:0 auto 30px;
    padding:14px 20px;
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    align-items:center;
    justify-content:center;
    border-top:1px dashed var(--gold-light);
    border-bottom:1px dashed var(--gold-light);
    padding-top:18px;
    padding-bottom:18px;
  }

  .upload-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:11px 22px;
    background:var(--maroon);
    color:var(--cream);
    border:none;
    border-radius:30px;
    font-family:var(--font-body);
    font-size:13px;
    letter-spacing:1px;
    cursor:pointer;
    transition:background .2s;
  }
  .upload-btn:hover{ background:var(--maroon-deep); }

  .upload-btn.secondary{
    background:transparent;
    color:var(--maroon);
    border:1px solid var(--maroon);
  }
  .upload-btn.secondary:hover{ background:var(--maroon); color:var(--cream); }

  .upload-note{
    font-size:12px;
    color:var(--maroon);
    opacity:0.65;
    text-align:center;
    width:100%;
    max-width:560px;
    line-height:1.6;
  }

  /* ---------- GALLERY ---------- */
  .gallery{
    max-width:1400px;
    margin:0 auto;
    padding:10px 16px 80px;
    column-count:4;
    column-gap:14px;
  }

  @media (max-width:1100px){ .gallery{column-count:3;} }
  @media (max-width:760px){ .gallery{column-count:2; padding:10px 10px 60px;} }
  @media (max-width:460px){ .gallery{column-count:1;} }

  .photo-card{
    break-inside:avoid;
    margin-bottom:14px;
    position:relative;
    overflow:hidden;
    border-radius:6px;
    background:#eee2c8;
    cursor:pointer;
    box-shadow:0 2px 10px rgba(60,10,23,0.08);
    border:1px solid rgba(201,161,74,0.25);
  }

  .photo-card img{
    width:100%;
    display:block;
    transition:transform .5s ease;
  }
  .photo-card:hover img{ transform:scale(1.04); }

  .photo-card .label{
    position:absolute;
    bottom:0; left:0; right:0;
    padding:18px 12px 8px;
    background:linear-gradient(to top, rgba(60,10,23,0.75), transparent);
    color:#f7f0e3;
    font-size:12px;
    letter-spacing:1px;
    opacity:0;
    transition:opacity .3s;
    pointer-events:none;
  }
  .photo-card:hover .label{ opacity:1; }

  .photo-card .download-btn{
    position:absolute;
    top:8px; right:8px;
    width:32px; height:32px;
    border-radius:50%;
    background:rgba(60,10,23,0.7);
    color:#f7f0e3;
    border:1px solid rgba(233,213,160,0.5);
    font-size:14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    transition:opacity .2s, background .2s;
    text-decoration:none;
  }
  .photo-card:hover .download-btn{ opacity:1; }
  .photo-card .download-btn:hover{ background:var(--maroon); }

  .photo-card .remove-btn{
    position:absolute;
    top:8px; right:8px;
    width:26px; height:26px;
    border-radius:50%;
    background:rgba(60,10,23,0.75);
    color:#f7f0e3;
    border:none;
    font-size:14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    transition:opacity .2s;
  }
  .photo-card:hover .remove-btn{ opacity:1; }

  .empty-state{
    text-align:center;
    padding:80px 20px;
    color:var(--maroon);
    opacity:0.6;
    font-style:italic;
    font-size:18px;
  }

  /* ---------- LIGHTBOX ---------- */
  .lightbox{
    position:fixed;
    inset:0;
    background:rgba(20,5,9,0.95);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
    flex-direction:column;
  }
  .lightbox.open{ display:flex; }

  .lightbox img{
    max-width:100vw;
    max-height:100vh;
    width:auto;
    height:auto;
    object-fit:contain;
    border-radius:0;
    box-shadow:none;
  }

  .lightbox .lb-caption{
    position:absolute;
    bottom:20px;
    left:0;
    right:0;
    text-align:center;
    color:var(--gold-light);
    font-size:14px;
    letter-spacing:2px;
    pointer-events:none;
  }

  .lb-close, .lb-prev, .lb-next{
    position:absolute;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(233,213,160,0.4);
    color:var(--gold-light);
    cursor:pointer;
    border-radius:50%;
    width:46px; height:46px;
    font-size:20px;
    display:flex; align-items:center; justify-content:center;
    transition:background .2s;
  }
  .lb-close:hover, .lb-prev:hover, .lb-next:hover{ background:rgba(255,255,255,0.2); }

  .lb-close{ top:24px; right:24px; }
  .lb-prev{ left:24px; top:50%; transform:translateY(-50%); }
  .lb-next{ right:24px; top:50%; transform:translateY(-50%); }
  .lb-download{ top:24px; right:82px; text-decoration:none; }

  @media (max-width:600px){
    .lb-prev{ left:8px; width:38px; height:38px; }
    .lb-next{ right:8px; width:38px; height:38px; }
    .lb-close{ top:12px; right:12px; width:38px; height:38px; }
    .lb-download{ top:12px; right:60px; width:38px; height:38px; }
  }

  footer{
    text-align:center;
    padding:30px;
    color:var(--maroon);
    opacity:0.8;
    font-size:13px;
    letter-spacing:2px;
    line-height:1.8;
}
</style>
</head>

<header>
  <div class="eyebrow">A Celebration Of</div>
  <h1 class="title">Jitendra <span class="ampersand">&amp;</span> Rinki</h1>
  <div class="subtitle">Wedding Album</div>
  <svg class="ornament" viewBox="0 0 200 40" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 20 H70 M130 20 H200" stroke="#c9a14a" stroke-width="1"/>
    <circle cx="100" cy="20" r="6" fill="none" stroke="#c9a14a" stroke-width="1.5"/>
    <circle cx="80" cy="20" r="2" fill="#c9a14a"/>
    <circle cx="120" cy="20" r="2" fill="#c9a14a"/>

</header>

<div class="controls">
  <div class="search-box">

</div>



<div class="gallery" id="gallery"></div>

<div class="empty-state" id="emptyState" style="display:none;">Koi photo nahi mili — kuch aur search karke dekhein</div>

<div class="lightbox" id="lightbox">
  <button class="lb-prev" id="lbPrev">&#10094;</button>
  <img id="lbImage" src="" alt="">
  <a class="lb-close lb-download" id="lbDownload" download title="Download">&#11015;</a>
  <div class="lb-caption" id="lbCaption"></div>
  <button class="lb-next" id="lbNext">&#10095;</button>
  <button class="lb-close" id="lbClose">&#10005;</button>
</div>

<footer>Made with love &middot; Jitendra &amp; Rinki ki Shaadi<br>Created &amp; Managed by Ankit Sahu</footer>

/* ========================== Yahan se neeche code mat chhede (auto logic) ========================== */

let activeCategory = "All";
let searchTerm = "";

const galleryEl = document.getElementById('gallery');
const counterEl = document.getElementById('counter');
const pillsEl = document.getElementById('filterPills');
const emptyStateEl = document.getElementById('emptyState');

function getCategories(){
  const set = new Set();
  photos.forEach(p => { if(p.category) set.add(p.category); });
  return ["All", ...Array.from(set)];
}

function renderPills(){
  const cats = getCategories();
  pillsEl.innerHTML = "";
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'pill' + (cat === activeCategory ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { activeCategory = cat; renderPills(); renderGallery(); };
    pillsEl.appendChild(btn);
  });
}

function getFiltered(){
  return photos.filter(p => {
    const matchesCat = activeCategory === "All" || p.category === activeCategory;
    const matchesSearch = searchTerm === "" ||
      p.file.toLowerCase().includes(searchTerm) ||
      (p.category || "").toLowerCase().includes(searchTerm);
    return matchesCat && matchesSearch;
  });
}

let currentList = [];

function renderGallery(){
  currentList = getFiltered();
  galleryEl.innerHTML = "";
  counterEl.textContent = currentList.length + " photos";
  emptyStateEl.style.display = currentList.length === 0 ? 'block' : 'none';

  currentList.forEach((p, idx) => {
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.onclick = () => openLightbox(idx);

    const img = document.createElement('img');
    img.src = p.file;
    img.loading = "lazy";
    img.alt = p.category || "Wedding photo";
    img.onerror = () => { card.style.display = 'none'; };

    card.appendChild(img);

    const downloadBtn = document.createElement('a');
    downloadBtn.className = 'download-btn';
    downloadBtn.href = p.file;
    downloadBtn.download = p.file.split('/').pop();
    downloadBtn.title = 'Download';
    downloadBtn.innerHTML = '&#11015;';
    downloadBtn.onclick = (e) => e.stopPropagation();
    card.appendChild(downloadBtn);

    if(p.category){
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = p.category;
      card.appendChild(label);
    }

    galleryEl.appendChild(card);
  });
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchTerm = e.target.value.toLowerCase();
  renderGallery();
});

/* ---------- Lightbox ---------- */
let lbIndex = 0;
const lightboxEl = document.getElementById('lightbox');
const lbImage = document.getElementById('lbImage');
const lbCaption = document.getElementById('lbCaption');

function openLightbox(idx){
  lbIndex = idx;
  showLightboxImage();
  lightboxEl.classList.add('open');
}

function showLightboxImage(){
  const p = currentList[lbIndex];
  lbImage.src = p.file;
  lbCaption.textContent = p.category ? p.category : "";
  const dlBtn = document.getElementById('lbDownload');
  dlBtn.href = p.file;
  dlBtn.download = p.file.split('/').pop();
}

document.getElementById('lbClose').onclick = () => lightboxEl.classList.remove('open');
document.getElementById('lbNext').onclick = () => {
  lbIndex = (lbIndex + 1) % currentList.length;
  showLightboxImage();
};
document.getElementById('lbPrev').onclick = () => {
  lbIndex = (lbIndex - 1 + currentList.length) % currentList.length;
  showLightboxImage();
};
lightboxEl.addEventListener('click', (e) => {
  if(e.target === lightboxEl) lightboxEl.classList.remove('open');
});
document.addEventListener('keydown', (e) => {
  if(!lightboxEl.classList.contains('open')) return;
  if(e.key === 'Escape') lightboxEl.classList.remove('open');
  if(e.key === 'ArrowRight') document.getElementById('lbNext').click();
  if(e.key === 'ArrowLeft') document.getElementById('lbPrev').click();
});

/* ---------- Init ---------- */
renderPills();
renderGallery();
</script>
